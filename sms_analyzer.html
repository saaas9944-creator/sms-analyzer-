<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--yellow:#e3b341;--purple:#bc8cff;--orange:#f0883e;
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);padding:16px;min-height:100vh;}
h1{font-size:1.3rem;font-weight:900;color:var(--accent);margin-bottom:4px;}
.sub{font-size:.78rem;color:var(--muted);margin-bottom:18px;}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:28px 20px;text-align:center;cursor:pointer;margin-bottom:20px;}
.upload-zone:hover{border-color:var(--accent);}
.upload-zone input{display:none;}
.upload-icon{font-size:2rem;margin-bottom:6px;}
.upload-label{font-size:.85rem;color:var(--muted);}
.upload-label b{color:var(--accent);}
.period-row{display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.period-row label{font-size:.78rem;color:var(--muted);}
.period-row select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:Tajawal,sans-serif;font-size:.8rem;}
.section-title{font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:10px;}

/* Budget card */
.bcard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.bcard.mat{border-right:3px solid var(--orange);}
.bcard.groc{border-right:3px solid var(--green);}
.bcard-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 0;}
.bcard-name{font-size:.95rem;font-weight:800;}
.bcard-name.mat{color:var(--orange);}
.bcard-name.groc{color:var(--green);}
.bcard-budget{font-size:.78rem;color:var(--muted);}
.bcard-bar{margin:10px 14px 0;background:var(--card2);border-radius:6px;height:7px;overflow:hidden;}
.bcard-bar-fill{height:100%;border-radius:6px;}
.bar-mat{background:var(--orange);}
.bar-groc{background:var(--green);}

/* Accordion */
.acc-toggle{width:100%;padding:10px 14px;background:transparent;border:none;border-top:1px solid var(--border);color:var(--accent);font-family:Tajawal,sans-serif;font-size:.8rem;cursor:pointer;text-align:right;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.acc-body{padding:12px 14px;border-top:1px solid var(--border);display:none;}
.acc-body.open{display:block;}

/* Rows inside accordion */
.arow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(48,54,61,.4);font-size:.82rem;}
.arow:last-child{border-bottom:none;}
.arow-label{color:var(--muted);}
.arow-val{font-weight:700;}
.arow-val.red{color:var(--red);}
.arow-val.green{color:var(--green);}
.arow-val.yellow{color:var(--yellow);}
.arow-val.blue{color:var(--accent);}
.arow-val.orange{color:var(--orange);}

.divider{border:none;border-top:1px solid var(--border);margin:8px 0;}

/* Input */
.inp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;}
.inp-row label{font-size:.8rem;color:var(--muted);}
.inp-row input{width:90px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:Tajawal,sans-serif;font-size:.82rem;text-align:left;direction:ltr;}

/* Quarter bars */
.qrow{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.78rem;}
.qrow-label{color:var(--muted);width:50px;flex-shrink:0;}
.qrow-bar{flex:1;background:var(--card2);border-radius:4px;height:7px;overflow:hidden;}
.qrow-fill{height:100%;border-radius:4px;background:var(--green);}
.qrow-fill.over{background:var(--red);}
.qrow-amt{font-size:.75rem;font-weight:700;width:60px;text-align:left;direction:ltr;}

/* Cards section */
.card-block{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border);}
.card-num{font-size:.85rem;font-weight:800;}
.card-info{font-size:.72rem;color:var(--muted);}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(48,54,61,.3);font-size:.8rem;}
.tx-row:last-child{border-bottom:none;}
.tx-left{flex:1;}
.tx-merchant{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.tx-date{font-size:.68rem;color:var(--muted);}
.tx-right{display:flex;align-items:center;gap:6px;}
.badge{padding:2px 6px;border-radius:5px;font-size:.62rem;font-weight:700;white-space:nowrap;}
.b-buy{background:rgba(248,81,73,.15);color:var(--red);}
.b-pay{background:rgba(63,185,80,.15);color:var(--green);}
.b-rp{background:rgba(227,179,65,.15);color:var(--yellow);}
.b-rd{background:rgba(63,185,80,.15);color:var(--green);}
.b-tr{background:rgba(88,166,255,.15);color:var(--accent);}
.tx-amt{font-weight:800;direction:ltr;font-size:.82rem;}
.tx-amt.neg{color:var(--red);}
.tx-amt.pos{color:var(--green);}
.show-more{width:100%;padding:8px;background:transparent;border:none;border-top:1px solid var(--border);color:var(--accent);font-family:Tajawal,sans-serif;font-size:.75rem;cursor:pointer;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:.85rem;}

/* Visa 5940 installment card */
.bcard.inst{border-right:3px solid var(--purple);}
.bcard-name.inst{color:var(--purple);}
.bar-inst{background:var(--purple);}
.inst-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:8px;}
.inst-table th{color:var(--muted);font-weight:700;padding:4px 6px;text-align:right;border-bottom:1px solid var(--border);}
.inst-table td{padding:5px 6px;border-bottom:1px solid rgba(48,54,61,.3);text-align:right;}
.inst-table tr.cur-month{background:rgba(188,140,255,.08);}
.inst-table tr.done{opacity:.45;}

/* Cashback toggle */
.cb-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.78rem;}
.cb-row label{color:var(--muted);}
.cb-toggle{display:flex;gap:4px;}
.cb-btn{padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:.72rem;cursor:pointer;font-family:Tajawal,sans-serif;}
.cb-btn.active{background:var(--green);color:#0d1117;border-color:var(--green);font-weight:800;}
</style>

<body>

<p class="sub">الراجحي · BSF — يوم 27 إلى 26 من كل شهر</p>

<div class="upload-zone" onclick="document.getElementById('xmlFile').click()">

<div id="app" style="display:none">
  <div class="period-row">

      <option value="4">مايو</option><option value="5">يونيو</option>

<script>
// ========== إعدادات ==========
var CARDS = {
  '0897': {cat:'mat',  type:'visa', bank:'الراجحي', label:'فيزا 0897', limit:6000},
  '4822': {cat:'mat',  type:'mada', bank:'الراجحي', label:'مدى 4822'},
  '4057': {cat:'groc', type:'visa', bank:'BSF',      label:'فيزا 4057', limit:null},
  '4723': {cat:'groc', type:'mada', bank:'BSF',      label:'مدى 4723'},
  '6575': {cat:'other',type:'visa', bank:'BSF',      label:'فيزا 6575'},
};
var BUDGETS = {
  mat:  {name:'🍔 مطاعم',     budget:1861, dailyBudget:1861, cls:'mat', bar:'bar-mat'},
  groc: {name:'🛒 سوبرماركت', budget:2070, dailyBudget:620,  weeklyBudget:1450, cls:'groc', bar:'bar-groc'},
};

var allTx = [];
// حالة يدوية محفوظة
var manualState = {
  matSupport: 0,
  grocWeekly: 0,
  grocWeeklyQ: [0,0,0,0],
  grocCashback: true,
  dailyCashback: false,
  grocDailyAdj: 0,
  grocWeeklyAdj: 0,
  excludedTransfers: {},
};

// ========== تحميل الملف ==========
function loadFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    parseSMS(ev.target.result);
    var now = new Date();
    // القائمة تختار الشهر الحالي دائماً (نفس ما يعرضه ميزانيتي)
    document.getElementById('selMonth').value = now.getMonth();
    document.getElementById('selYear').value = now.getFullYear();
    document.getElementById('app').style.display = 'block';
    document.getElementById('budgetSection').innerHTML = '<p style="color:var(--accent);padding:10px;">✅ قُرئ الملف — '+allTx.length+' عملية — الفترة: '+new Date(getPeriod().from).toLocaleDateString()+' → '+new Date(getPeriod().to).toLocaleDateString()+'</p>';
    renderVisa5940();
    try {
      render();
    } catch(err) {
      document.getElementById('budgetSection').innerHTML += '<p style="color:var(--red);padding:10px;">❌ خطأ: '+err.message+'</p>';
    }
  };
  reader.readAsText(file);
}

// ========== تحليل الرسائل ==========
function parseSMS(xml) {
  allTx = [];
  var parser = new DOMParser();
  var doc = parser.parseFromString(xml, 'text/xml');
  doc.querySelectorAll('sms').forEach(function(sms) {
    var addr = sms.getAttribute('address') || '';
    var body = sms.getAttribute('body') || '';
    var ms   = parseInt(sms.getAttribute('date') || '0');
    if (addr === 'AlRajhiBank') parseRajhi(body, ms);
    else if (addr === 'BSF')    parseBSF(body, ms);
  });
  allTx.sort(function(a,b){ return b.dateMs - a.dateMs; });
  checkRefunds();
  checkTransit();
}

function rem(body, pats) {
  for (var i=0; i<pats.length; i++) {
    var m = body.match(pats[i]);
    if (m) return m;
  }
  return null;
}

function parseRajhi(body, ms) {
  // كاش باك (استرداد نقدي إلى البطاقة)
  if (body.indexOf('استرداد نقدي إلى البطاقة') === 0) {
    var cardM = body.match(/(\d{4})/);
    var amtM  = body.match(/([\d,.]+) ريال/);
    if (!amtM) return;
    var card = cardM ? cardM[1] : '????';
    push({txType:'cashback', card:card,
      merchant:'كاش باك', amount:num(amtM[1]),
      balance:null, dateMs:ms, dateStr:fmtD(ms)});
    return;
  }
  // استرداد
  if (body.indexOf('بطاقة ائتمانية استرداد مبلغ') === 0) {
    var cardM = body.match(/بطاقة: (\d{4})/);
    var amtM  = body.match(/مبلغ: ([\d,.]+) SAR/);
    var merM  = body.match(/التاجر: ([^\n]+)/);
    if (!amtM) return;
    push({txType:'refund_pending', card:cardM?cardM[1]:'????',
      merchant:merM?merM[1].trim():'استرداد',
      amount:num(amtM[1]), balance:null, dateMs:ms, dateStr:fmtD(ms)});
    return;
  }
  // تحويل بطاقة ائتمانية → 8854 (من 6501)
  if (body.indexOf('بطاقة ائتمانية:تحويل') === 0 && body.indexOf('8854') >= 0) {
    var amtM = body.match(/مبلغ:SR ([\d,.]+)/);
    if (!amtM) return;
    // نحفظها مؤقتاً كـ "transit_pending" — سيتم تصنيفها بعد checkTransit
    push({txType:'transit_pending', card:'4822', sign:1,
      merchant:'تحويل 6501→8854',
      amount:num(amtM[1]), balance:null, dateMs:ms, dateStr:fmtD(ms)});
    return;
  }
  // حوالة بين حساباتك
  if (body.indexOf('حوالة بين حساباتك') === 0) {
    var amtM = rem(body, [/مبلغ: SAR ([\d,.]+)/, /مبلغ: SR ([\d,.]+)/, /مبلغ:SR ([\d,.]+)/]);
    if (!amtM) return;
    // فحص دقيق: "الى: 8854" أو "من: 8854"
    var to8854 = /الى:\s*8854/.test(body);
    var fr8854 = /من:\s*8854/.test(body);
    if (!to8854 && !fr8854) return;
    var sign = to8854 ? 1 : -1;
    push({txType:'transfer', card:'4822', sign:sign,
      merchant: to8854 ? '↑ وارد لـ8854' : '↓ صادر من 8854',
      amount:num(amtM[1]), balance:null, dateMs:ms, dateStr:fmtD(ms)});
    return;
  }
  // شراء
  if (body.indexOf('شراء') === 0) {
    var cardM = rem(body, [/بطاقة:(\d{4})/, /عبر:?(\d{4})/]);
    if (cardM && cardM[1] === '2203') return; // مستبعدة
    var amtM  = rem(body, [/اجمالي المبلغ المستحق: ([\d,.]+) SAR/, /مبلغ:SAR ([\d,.]+)/, /مبلغ: ([\d,.]+) SAR/, /مبلغ:([\d,.]+) SAR/, /بـSR ([\d,.]+)/, /بـSAR ([\d,.]+)/, /بـ ([\d,.]+) SAR/]);
    var merM  = rem(body, [/لدى:([^\n]+)/, /لـ([^\n]+)/]);
    var balM  = rem(body, [/رصيد:SAR ([\d,.]+)/, /رصيد: ([\d,.]+) SAR/, /رصيد:([\d,.]+) SAR/, /رصيد:([\d,.]+) SR/]);
    if (!amtM) return;
    push({txType:'purchase', card:cardM?cardM[1]:'????',
      merchant:merM?merM[1].split('\n')[0].trim():'غير محدد',
      amount:num(amtM[1]), balance:balM?num(balM[1]):null, dateMs:ms, dateStr:fmtD(ms)});
    return;
  }
  // سداد
  if (body.indexOf('بطاقة فيزا:سداد') === 0 || body.indexOf('بطاقة ائتمانية:سداد') === 0) {
    var cardM = rem(body, [/بطاقة:(\d{4})/, /عبر(\d{4})/]);
    var amtM  = rem(body, [/مبلغ:SAR ([\d,.]+)/, /بـSR ([\d,.]+)/]);
    var balM  = rem(body, [/رصيد:SAR ([\d,.]+)/, /رصيد:([\d,.]+) SR/]);
    if (!amtM) return;
    push({txType:'payment', card:cardM?cardM[1]:'????',
      merchant:'سداد بطاقة', amount:num(amtM[1]),
      balance:balM?num(balM[1]):null, dateMs:ms, dateStr:fmtD(ms)});
  }
}

function parseBSF(body, ms) {
  if (body.indexOf('تسديد بطاقة ائتمانية') === 0) {
    var cardM = body.match(/(\d{4})\*/);
    var amtM  = body.match(/بـ ([\d,.]+) SAR/);
    var balM  = body.match(/رصيد ([\d,.]+)/);
    if (!amtM || !cardM) return;
    push({txType:'payment', card:cardM[1],
      merchant:'سداد بطاقة', amount:num(amtM[1]),
      balance:balM?num(balM[1]):null, dateMs:ms, dateStr:fmtD(ms)});
    return;
  }
  if (body.indexOf('شراء عبر نقاط البيع') === 0) {
    var amtM  = rem(body, [/بـ SAR ([\d,.]+)/, /بـ ([\d,.]+) SAR/]);
    var merM  = body.match(/من ([^\n]+)/);
    var cardM = body.match(/(\d{4})\*/);
    var balM  = rem(body, [/رصيد المتوفر: SAR ([\d,.]+)/, /رصيد SAR ([\d,.]+)/]);
    if (!amtM) return;
    push({txType:'purchase', card:cardM?cardM[1]:'????',
      merchant:merM?merM[1].trim():'غير محدد',
      amount:num(amtM[1]), balance:balM?num(balM[1]):null, dateMs:ms, dateStr:fmtD(ms)});
  }
}

function push(tx) { allTx.push(tx); }
function num(s) { return parseFloat((s||'0').replace(/,/g,'')); }
function fmtD(ms) { var d=new Date(ms); return d.getDate()+'/'+(d.getMonth()+1); }
function fmt(n) { return Math.abs(n).toLocaleString('ar-SA',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function fmtSigned(n) { return (n<0?'-':'')+fmt(n); }

// ========== تأكيد الاسترداد ==========
function checkRefunds() {
  var byCard = {};
  allTx.forEach(function(t) {
    if (!byCard[t.card]) byCard[t.card] = [];
    byCard[t.card].push(t);
  });
  Object.keys(byCard).forEach(function(card) {
    var txs = byCard[card].slice().sort(function(a,b){ return a.dateMs-b.dateMs; });
    txs.forEach(function(ref) {
      if (ref.txType !== 'refund_pending') return;
      var after = txs.filter(function(t){ return t.dateMs > ref.dateMs && t.balance != null; });
      for (var i=1; i<after.length; i++) {
        var prev = after[i-1], curr = after[i];
        var expected = curr.txType==='purchase' ? prev.balance - curr.amount
                     : curr.txType==='payment'  ? prev.balance + curr.amount : null;
        if (expected === null) continue;
        if (Math.abs((curr.balance - expected) - ref.amount) <= 2) {
          ref.txType = 'refund_done'; ref.refundDate = curr.dateStr; return;
        }
      }
      for (var i=1; i<after.length; i++) {
        var rise = after[i].balance - after[i-1].balance;
        if (Math.abs(rise - ref.amount) <= 2 && after[i].txType !== 'purchase') {
          ref.txType = 'refund_done'; ref.refundDate = after[i].dateStr; return;
        }
      }
    });
  });
}

// ========== تصنيف حوالات العبور ==========
function checkTransit() {
  var WINDOW = 10 * 60 * 1000; // 10 دقائق
  var transits = allTx.filter(function(t){ return t.txType==='transit_pending'; });
  var pays7443 = allTx.filter(function(t){ return t.card==='7443' && t.txType==='payment'; });

  transits.forEach(function(tr) {
    var matched = false;
    for (var i=0; i<pays7443.length; i++) {
      var p = pays7443[i];
      if (Math.abs(p.dateMs - tr.dateMs) <= WINDOW && Math.abs(p.amount - tr.amount) <= 1) {
        tr.txType = 'transit'; // عبور — يُخصم
        tr.sign   = -1;
        tr.merchant = '↕️ عبور 6501→8854→7443';

      tr.txType = 'transfer'; // دعم حقيقي — يُضاف
      tr.sign   = 1;
      tr.merchant = '↑ وارد لـ8854';
    }
  });
}

function renderVisa5940() {
  var selM = parseInt(document.getElementById('selMonth').value);
  var selY = parseInt(document.getElementById('selYear').value);
  var limit = VISA5940.limit;

  // حساب الرصيد المتاح قبل وبعد الكشف لكل شهر
  // قبل الكشف = بعد الشهر السابق + إجمالي الأقساط
  // بعد الكشف = قبل الكشف - (ضريبة القسط + ضريبة الدولة)
  var rows = [];
  var afterPrev = VISA5940.startBalance - 947.14;

  VISA5940.schedule.forEach(function(s) {
    var totalInst = s.i1 + s.i2 + s.i2tax + s.stax;
    var taxOnly   = s.i2tax + s.stax;
    var before, after;
    if (s.i1 === 0 && s.i2 === 0) {
      before = limit;
      after  = limit;
    } else {
      before = Math.min(afterPrev + totalInst, limit);
      after  = Math.min(before - taxOnly, limit);

    rows.push({
      y: s.y, m: s.m,
      before: Math.round(before * 100) / 100,
      after:  Math.round(after  * 100) / 100,
      inst: totalInst,
      i1: s.i1, i2: s.i2, i2tax: s.i2tax, stax: s.stax,
      done: s.i1===0 && s.i2===0
    });
    afterPrev = after;
  });

  // الشهر الحالي (المختار)
  var curIdx = rows.findIndex(function(r){ return r.y===selY && r.m===selM; });
  var curRow = curIdx >= 0 ? rows[curIdx] : null;

  var summaryHtml = '';

      + '<div class="arow"><span class="arow-label">✅ بعد كشف الحساب</span><span class="arow-val green">'+fmt(curRow.after)+' ر.س</span></div>'
      + '<hr class="divider">'
      + (curRow.i1>0?'<div class="arow"><span class="arow-label">قسط عملية 4,643.5</span><span class="arow-val orange">'+fmt(curRow.i1)+' ر.س</span></div>':'')
      + (curRow.i2>0?'<div class="arow"><span class="arow-label">قسط عملية 1,849 (أصل)</span><span class="arow-val orange">'+fmt(curRow.i2)+' ر.س</span></div>':'')
      + (curRow.i2tax>0?'<div class="arow"><span class="arow-label">ضريبة القسط</span><span class="arow-val orange">'+fmt(curRow.i2tax)+' ر.س</span></div>':'')
      + (curRow.stax>0?'<div class="arow"><span class="arow-label">ضريبة الدولة</span><span class="arow-val orange">'+fmt(curRow.stax)+' ر.س</span></div>':'')
      + '<div class="arow"><span class="arow-label" style="font-weight:800">إجمالي الأقساط</span><span class="arow-val red">'+fmt(curRow.inst)+' ر.س</span></div>';
  } else if (curRow && curRow.done) {
    summaryHtml = '<div class="arow"><span class="arow-label">🎉 انتهت جميع الأقساط</span><span class="arow-val green">الحد كاملاً '+fmt(limit)+' ر.س</span></div>';
  } else {
    summaryHtml = '<div class="arow"><span class="arow-label" style="color:var(--muted)">لا توجد بيانات لهذا الشهر</span></div>';
  }

  // جدول الشهور
  var tableHtml = '<table class="inst-table">'
    + '<tr><th>الشهر</th><th>قبل الكشف</th><th>بعد الكشف</th><th>الأقساط</th></tr>';

  rows.forEach(function(r, i) {
    var isCur = (r.y===selY && r.m===selM);

  var html = '<div class="bcard inst">'

function getPeriod() {
  var m  = parseInt(document.getElementById('selMonth').value);
  var y  = parseInt(document.getElementById('selYear').value);
  var sd = parseInt(document.getElementById('startDay') ? document.getElementById('startDay').value : 27) || 27;
  var ed = 26; // يوم النهاية ثابت دائماً = 26
  // من sd الشهر المختار → 26 الشهر التالي
  var nm = m+1, ny = y;
  if (nm > 11) { nm = 0; ny = y+1; }
  return {
    from: new Date(y,  m,  sd,  0, 0, 0).getTime(),
    to:   new Date(ny, nm, ed, 23,59,59).getTime()
  };
}

// أيام مضت من بداية الفترة
function daysPassed(from) {
  var now = Math.min(Date.now(), getPeriod().to);
  return Math.max(1, Math.ceil((now - from) / 86400000));
}

// أيام متبقية حتى نهاية الفترة
function daysLeft(to) {
  var now = Date.now();
  if (now > to) return 0;
  return Math.ceil((to - now) / 86400000);
}

// الربع الحالي (1-4)
function currentQuarter(from, to) {
  var total = to - from;
  var passed = Date.now() - from;
  return Math.min(4, Math.floor(passed / (total/4)) + 1);
}

      parseFloat(document.getElementById('grocQ4') ? document.getElementById('grocQ4').value : 0) || 0,
    ];
    var totalQSpent = qSpent.reduce(function(a,b){ return a+b; }, 0);
    // إجمالي المصروف الأسبوعي = مجموع الأرباع + تعديل يدوي
    var weeklySpent = totalQSpent + weeklyAdj;

    var wLeft   = wBudget - weeklySpent;
    var wLeftAfter  = wBudget - totalQSpent - weeklyAdj;
    var quartersLeft = 4 - qSpent.filter(function(q){ return q > 0; }).length;
    var perQLeft    = quartersLeft > 0 ? wLeftAfter / quartersLeft : 0;

    // كاش باك 10% على الأسبوعي
    var cbActive = manualState.grocCashback;

    // رسم الأرباع
    var qHtml = '';
    for (var qi=0; qi<4; qi++) {
      var qs = qSpent[qi];
      var qLabel = 'ربع ' + (qi+1);
      var qPct   = Math.min(100, qs/qBudget*100);
      var qOver  = qs > qBudget;
      var qAlloc = qi < 4 - quartersLeft ? qs : perQLeft;
      var qStatus = qs > 0 ? (qOver ? '⚠️ تجاوز' : '✅') : (qi+1 === curQ ? '← الحالي' : '⬜');
      qHtml += '<div class="qrow">'
        + '<span class="qrow-label">' + qLabel + '</span>'
        + '<div class="qrow-bar"><div class="qrow-fill' + (qOver?' over':'') + '" style="width:'+qPct.toFixed(1)+'%"></div></div>'
        + '<span class="qrow-amt" style="color:'+(qOver?'var(--red)':qs>0?'var(--green)':'var(--muted)')+'">'+fmt(qs>0?qs:qAlloc)+' '+qStatus+'</span>'
        + '</div>';
    }

    html += '<div class="bcard groc">'
      + '<div class="bcard-hdr"><span class="bcard-name groc">' + info.name + '</span><span class="bcard-budget">الرصيد: ' + fmt(info.budget) + ' ر.س</span></div>'
      + '<div class="bcard-bar"><div class="bcard-bar-fill bar-groc" style="width:'+pct.toFixed(1)+'%"></div></div>'
      + '<button class="acc-toggle" onclick="toggleAcc(\'groc\')">'
      + '<span>📱 تفاصيل SMS</span><span id="groc-arrow">▼</span></button>'
      + '<div class="acc-body" id="acc-groc">'

      // يومي
      + '<div style="font-size:.75rem;font-weight:800;color:var(--muted);margin-bottom:6px;">🕘 يومي (مخصص: '+fmt(dailyBudget)+' ر.س)</div>'
      + '<div class="arow"><span class="arow-label" style="color:var(--red)">🔻 صرفت (مدى+فيزا)</span><span class="arow-val red">' + fmt(dailySpent) + ' ر.س</span></div>'
      + '<div class="arow" style="padding-right:12px"><span class="arow-label" style="color:var(--muted);font-size:.75rem">↳ مدى 4723</span><span class="arow-val" style="font-size:.75rem;color:var(--muted)">' + fmt(madaBuyTotal) + ' ر.س</span></div>'
      + '<div class="arow" style="padding-right:12px"><span class="arow-label" style="color:var(--muted);font-size:.75rem">↳ فيزا 4057</span><span class="arow-val" style="font-size:.75rem;color:var(--muted)">' + fmt(visaBuyTotal) + ' ر.س</span></div>'
      + '<div class="inp-row"><label>✏️ تعديل يدوي يومي</label><div style="display:flex;gap:6px;align-items:center"><button onclick="var v=Math.abs(parseFloat(document.getElementById(\'dAdj\').value)||0);manualState.grocDailyAdj=-v;document.getElementById(\'dAdj\').value=-v;render()" style="width:36px;height:36px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:1.1rem;cursor:pointer">−</button><input type="number" id="dAdj" value="'+(manualState.grocDailyAdj||0)+'" onchange="manualState.grocDailyAdj=parseFloat(this.value)||0;render()" style="width:80px;text-align:center"><button onclick="var v=Math.abs(parseFloat(document.getElementById(\'dAdj\').value)||0);manualState.grocDailyAdj=v;document.getElementById(\'dAdj\').value=v;render()" style="width:36px;height:36px;border-radius:8px;border:none;background:var(--green);color:#fff;font-size:1.1rem;cursor:pointer">+</button></div></div>'
      + '<div class="cb-row"><label>كاش باك 10% على اليومي</label>'
      + '<div class="cb-toggle">'
      + '<button class="cb-btn' + (manualState.dailyCashback?' active':'') + '" onclick="manualState.dailyCashback=true;render()">نعم</button>'
      + '<button class="cb-btn' + (!manualState.dailyCashback?' active':'') + '" onclick="manualState.dailyCashback=false;render()">لا</button>'
      + '</div></div>'
      + (manualState.dailyCashback ? '<div class="arow"><span class="arow-label">💰 كاش باك يومي</span><span class="arow-val green">+ ' + fmt(dailyCashback) + ' ر.س</span></div>' : '')
      + '<div class="arow"><span class="arow-label">💵 متبقي يومي</span><span class="arow-val ' + (dailyBudget - dailySpent + posAdj >= 0 ? 'green' : 'red') + '">' + fmt(dailyBudget - dailySpent + posAdj) + ' ر.س</span></div>'
      + '<div class="arow"><span class="arow-label">' + dailyIcon + ' ' + dailySign + '</span><span class="arow-val ' + dailyColor + '">' + Math.abs(dailyDiffDays).toFixed(1) + ' يوم (' + fmt(Math.abs(dailyDiff)) + ' ر.س)</span></div>'
      + '<div class="arow"><span class="arow-label">📅 باقي من الشهر</span><span class="arow-val">' + dLeft + ' يوم</span></div>'

      + '<hr class="divider">'

      // أسبوعي
      + '<div style="font-size:.75rem;font-weight:800;color:var(--muted);margin-bottom:6px;">🗓️ أسبوعي (مخصص: '+fmt(wBudget)+' ر.س)</div>'
      + '<div class="arow"><span class="arow-label">🔻 صرفت (مجموع الأرباع)</span><span class="arow-val red">' + fmt(weeklySpent) + ' ر.س</span></div>'
      + '<div class="inp-row"><label>✏️ تعديل يدوي أسبوعي</label><div style="display:flex;gap:6px;align-items:center"><button onclick="var v=Math.abs(parseFloat(document.getElementById(\'wAdj\').value)||0);manualState.grocWeeklyAdj=-v;document.getElementById(\'wAdj\').value=-v;render()" style="width:36px;height:36px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:1.1rem;cursor:pointer">−</button><input type="number" id="wAdj" value="'+(manualState.grocWeeklyAdj||0)+'" onchange="manualState.grocWeeklyAdj=parseFloat(this.value)||0;render()" style="width:80px;text-align:center"><button onclick="var v=Math.abs(parseFloat(document.getElementById(\'wAdj\').value)||0);manualState.grocWeeklyAdj=v;document.getElementById(\'wAdj\').value=v;render()" style="width:36px;height:36px;border-radius:8px;border:none;background:var(--green);color:#fff;font-size:1.1rem;cursor:pointer">+</button></div></div>'
      + '<div class="arow"><span class="arow-label">متبقي</span><span class="arow-val ' + (wLeft>=0?'green':'red') + '">' + fmtSigned(wLeft) + ' ر.س</span></div>'

      + '<div style="margin:8px 0 4px;font-size:.72rem;color:var(--muted);">توزيع الأرباع:</div>'
      + '<div class="inp-row"><label>ربع 1</label><input type="number" id="grocQ1" value="'+qSpent[0]+'" onchange="manualState.grocWeeklyQ[0]=parseFloat(this.value)||0;render()"></div>'
      + '<div class="inp-row"><label>ربع 2</label><input type="number" id="grocQ2" value="'+qSpent[1]+'" onchange="manualState.grocWeeklyQ[1]=parseFloat(this.value)||0;render()"></div>'
      + '<div class="inp-row"><label>ربع 3</label><input type="number" id="grocQ3" value="'+qSpent[2]+'" onchange="manualState.grocWeeklyQ[2]=parseFloat(this.value)||0;render()"></div>'
      + '<div class="inp-row"><label>ربع 4</label><input type="number" id="grocQ4" value="'+qSpent[3]+'" onchange="manualState.grocWeeklyQ[3]=parseFloat(this.value)||0;render()"></div>'

      + '<div style="margin:8px 0 4px;">' + qHtml + '</div>'

      + '<div class="cb-row"><label>كاش باك 10% على الأسبوعي</label>'
      + '<div class="cb-toggle">'
      + '<button class="cb-btn' + (cbActive?' active':'') + '" onclick="manualState.grocCashback=true;render()">نعم</button>'
      + '<button class="cb-btn' + (!cbActive?' active':'') + '" onclick="manualState.grocCashback=false;render()">لا</button>'
      + '</div></div>'
      + (cbActive ? '<div class="arow"><span class="arow-label">💰 كاش باك متوقع</span><span class="arow-val green">'+fmt(weeklySpent*0.1)+' ر.س</span></div>' : '')

      + '<hr class="divider">'
      + '<div class="arow"><span class="arow-label">💳 غير مسدد</span><span class="arow-val yellow">' + fmt(unsettled) + ' ر.س</span></div>'
      + '<div class="arow"><span class="arow-label">🏦 رصيد المدى الحالي</span><span class="arow-val blue">' + fmt(madaBalance) + ' ر.س</span></div>'
      + '<div class="arow"><span class="arow-label">✅ رصيدي الآمن</span><span class="arow-val ' + (safeBalance>=0?'green':'red') + '">' + fmtSigned(safeBalance) + ' ر.س' + (safeBalance<0?' ⚠️':'') + '</span></div>'
      + '</div></div>';
  })();

  document.getElementById('budgetSection').innerHTML = html;
}

function toggleAcc(id) {
  var body  = document.getElementById('acc-' + id);
  var arrow = document.getElementById(id + '-arrow');
  var open  = body.classList.contains('open');
  body.classList.toggle('open', !open);
  arrow.textContent = open ? '▼' : '▲';
}

function renderCards(period) {
  var cardNums = [];
  period.forEach(function(t){
    if (t.card && t.card!=='????' && cardNums.indexOf(t.card)<0) cardNums.push(t.card);
  });
  var html = '';
  cardNums.forEach(function(card) {
    var info   = CARDS[card];
    var label  = info ? info.label : 'بطاقة '+card;
    var txs    = period.filter(function(t){ return t.card===card; });
    var buys   = txs.filter(function(t){ return t.txType==='purchase'; });
    var pays   = txs.filter(function(t){ return t.txType==='payment'; });
    var lastBal= txs.find(function(t){ return t.balance!=null; });
    var buyTot = sum(buys), payTot = sum(pays);

    var rowsHtml = txs.slice(0,10).map(function(t){
      var bCls, bLbl, neg;
      if (t.txType==='purchase')      { bCls='b-buy'; bLbl='شراء';          neg=true;  }
      else if (t.txType==='payment')  { bCls='b-pay'; bLbl='سداد';          neg=false; }
      else if (t.txType==='refund_done')   { bCls='b-rd';  bLbl='↩️ استرداد ✓'; neg=false; }
      else if (t.txType==='refund_pending'){ bCls='b-rp';  bLbl='⏳ استرداد';   neg=false; }
      else if (t.txType==='transfer') { bCls='b-tr';  bLbl='🔄 حوالة';      neg=t.sign<0; }
    else if (t.txType==='cashback')  { bCls='b-rd'; bLbl='💰 كاش باك'; neg=false; }
    else if (t.txType==='transit')  { return ''; } // مخفي
      else                            { bCls='b-pay'; bLbl=t.txType;         neg=false; }
      return '<div class="tx-row">'
        + '<div class="tx-left"><div class="tx-merchant">'+t.merchant+'</div><div class="tx-date">'+t.dateStr+'</div></div>'
        + '<div class="tx-right"><span class="badge '+bCls+'">'+bLbl+'</span>'
        + '<span class="tx-amt '+(neg?'neg':'pos')+'">'+(neg?'- ':'+ ')+fmt(t.amount)+'</span></div>'
        + '</div>';
    }).join('');

    var moreBtn = txs.length>10 ? '<button class="show-more" onclick="showMore(\''+card+'\')">عرض كل '+txs.length+' عملية ▼</button>' : '';

    html += '<div class="card-block" id="cb_'+card+'">'
      + '<div class="card-hdr"><span class="card-num">'+label+'</span>'
      + '<span class="card-info">مشتريات: '+fmt(buyTot)+(payTot>0?' · سداد: '+fmt(payTot):'')+(lastBal?' · رصيد: '+fmt(lastBal.balance):'')+'</span></div>'
      + '<div id="cr_'+card+'">'+rowsHtml+'</div>'+moreBtn+'</div>';
  });
  document.getElementById('cardsSection').innerHTML = html || '<div class="empty">لا توجد بيانات للفترة المختارة</div>';
}

function toggleTransfer(el) {
  var key = typeof el === 'string' ? el : el.dataset.key;
  if (manualState.excludedTransfers[key]) {
    delete manualState.excludedTransfers[key];
  } else {
    manualState.excludedTransfers[key] = true;
  }
  render();
}

function sendToMizaniti() {
  var status = document.getElementById('sendStatus');
  if (!window._fbSave) { status.textContent = '⚠️ Firebase غير متاح'; return; }
  var p = getPeriod();
  var m = parseInt(document.getElementById('selMonth').value);
  var y = parseInt(document.getElementById('selYear').value);
  var period = allTx.filter(function(t){ return t.dateMs>=p.from && t.dateMs<=p.to; });

  // بيانات المطاعم
  var visaBuysMat  = period.filter(function(t){ return t.card==='0897' && t.txType==='purchase'; });
  var visaPaysMat  = period.filter(function(t){ return t.card==='0897' && t.txType==='payment'; });
  var visaRefMat   = period.filter(function(t){ return t.card==='0897' && t.txType==='refund_done'; });
  var madaBuysMat  = period.filter(function(t){ return t.card==='4822' && t.txType==='purchase'; });
  var transfers    = period.filter(function(t){ return t.card==='4822' && t.txType==='transfer'; });
  var manSupport   = parseFloat(document.getElementById('matSupport') ? document.getElementById('matSupport').value : 0) || 0;

  var visaBuyTotMat = sum(visaBuysMat);
  var visaPayTotMat = sum(visaPaysMat);
  var visaRefTotMat = sum(visaRefMat);
  var madaBuyTotMat = sum(madaBuysMat);
  var transferNet   = transfers.reduce(function(s,t){ return s + (manualState.excludedTransfers['tr_'+t.dateMs]?0:t.sign*t.amount); }, 0);
  var totalSpentMat = madaBuyTotMat + visaBuyTotMat - visaRefTotMat;
  // غير مسدد = الحد الائتماني - آخر رصيد فيزا من الرسائل
  var visaMatTxsSorted = period.filter(function(t){ return t.card==='0897' && t.balance!=null; }).sort(function(a,b){return b.dateMs-a.dateMs;});
  var lastVisaBalMat   = visaMatTxsSorted.length ? visaMatTxsSorted[0].balance : null;
  var unsettledMat  = lastVisaBalMat !== null ? Math.max(0, 6000 - lastVisaBalMat) : Math.max(0, visaBuyTotMat - visaPayTotMat - visaRefTotMat);
  var madaBalMat    = 1861 - madaBuyTotMat - visaPayTotMat + transferNet + manSupport;
  var safeBalMat    = madaBalMat - unsettledMat;
  var passed        = daysPassed(p.from);
  var dLeft         = daysLeft(p.to);
  var dailyRateMat  = 1861 / 31;
  var diffMat       = totalSpentMat - dailyRateMat * passed;
  var diffDaysMat   = diffMat / dailyRateMat;

  var matData = {
    spent: totalSpentMat,
    unsettled: unsettledMat,
    madaBalance: madaBalMat,
    safeBalance: safeBalMat,
    diffDays: diffDaysMat,
    daysLeft: dLeft,
    updatedAt: Date.now()
  };

  // بيانات السوبرماركت
  var visaBuysGr   = period.filter(function(t){ return t.card==='4057' && t.txType==='purchase'; });
  var visaPaysGr   = period.filter(function(t){ return t.card==='4057' && t.txType==='payment'; });
  var visaRefGr    = period.filter(function(t){ return t.card==='4057' && t.txType==='refund_done'; });
  var madaBuysGr   = period.filter(function(t){ return t.card==='4723' && t.txType==='purchase'; });
  var weeklySpent  = parseFloat(document.getElementById('grocWeekly') ? document.getElementById('grocWeekly').value : 0) || 0;

  var visaBuyTotGr = sum(visaBuysGr);
  var visaPayTotGr = sum(visaPaysGr);
  var visaRefTotGr = sum(visaRefGr);
  var madaBuyTotGr = sum(madaBuysGr);
  var totalSpentGr = madaBuyTotGr + visaBuyTotGr - visaRefTotGr;
  var dailySpentGr = Math.max(0, totalSpentGr - weeklySpent);
  var unsettledGr  = Math.max(0, visaBuyTotGr - visaPayTotGr - visaRefTotGr);
  var madaBalGr    = 2070 - madaBuyTotGr - visaPayTotGr;
  var safeBalGr    = madaBalGr - unsettledGr;
  var dailyRateGr  = 620 / 31;
  var diffGr       = dailySpentGr - dailyRateGr * passed;
  var diffDaysGr   = diffGr / dailyRateGr;
  var cbActive     = manualState.grocCashback;
  var cashback     = cbActive ? weeklySpent * 0.1 : 0;

  var qSpent = [
    parseFloat(document.getElementById('grocQ1') ? document.getElementById('grocQ1').value : 0) || 0,
    parseFloat(document.getElementById('grocQ2') ? document.getElementById('grocQ2').value : 0) || 0,
    parseFloat(document.getElementById('grocQ3') ? document.getElementById('grocQ3').value : 0) || 0,
    parseFloat(document.getElementById('grocQ4') ? document.getElementById('grocQ4').value : 0) || 0,
  ];
  var totalQSpent   = qSpent.reduce(function(a,b){ return a+b; }, 0);
  var quartersLeft  = 4 - qSpent.filter(function(q){ return q > 0; }).length;
  var perQLeft      = quartersLeft > 0 ? (1450 - totalQSpent) / quartersLeft : 0;

  var grocData = {
    spent: totalSpentGr,
    dailySpent: dailySpentGr,
    weeklySpent: weeklySpent,
    unsettled: unsettledGr,
    madaBalance: madaBalGr,
    safeBalance: safeBalGr,
    diffDays: diffDaysGr,
    daysLeft: dLeft,
    cashback: cashback,
    quarters: qSpent,
    perQLeft: perQLeft,
    updatedAt: Date.now()
  };

  var matKey  = 'sms_summary_mat_'  + y + '_' + m;
  var grocKey = 'sms_summary_groc_' + y + '_' + m;

  status.textContent = '⏳ جاري الإرسال...';
  status.style.color = 'var(--muted)';

  Promise.all([
    window._fbSave(matKey, matData),
    window._fbSave(grocKey, grocData)
  ]).then(function() {
    status.textContent = '✅ تم الإرسال لميزانيتي بنجاح';
    status.style.color = 'var(--green)';
  }).catch(function(e) {
    status.textContent = '❌ خطأ: ' + e.message;
    status.style.color = 'var(--red)';
  });
}

function showMore(card) {
  var p = getPeriod();
  var txs = allTx.filter(function(t){ return t.card===card && t.dateMs>=p.from && t.dateMs<=p.to; });
  document.getElementById('cr_'+card).innerHTML = txs.map(function(t){
    var bCls, bLbl, neg;
    if (t.txType==='purchase')      { bCls='b-buy'; bLbl='شراء';          neg=true;  }
    else if (t.txType==='payment')  { bCls='b-pay'; bLbl='سداد';          neg=false; }
    else if (t.txType==='refund_done')   { bCls='b-rd';  bLbl='↩️ استرداد ✓'; neg=false; }
    else if (t.txType==='refund_pending'){ bCls='b-rp';  bLbl='⏳ استرداد';   neg=false; }
    else if (t.txType==='transfer') { bCls='b-tr';  bLbl='🔄 حوالة';      neg=t.sign<0; }
    else if (t.txType==='cashback')  { bCls='b-rd'; bLbl='💰 كاش باك'; neg=false; }
    else if (t.txType==='transit')  { return ''; } // مخفي
    else                            { bCls='b-pay'; bLbl=t.txType;         neg=false; }
    return '<div class="tx-row">'
      + '<div class="tx-left"><div class="tx-merchant">'+t.merchant+'</div><div class="tx-date">'+t.dateStr+'</div></div>'
      + '<div class="tx-right"><span class="badge '+bCls+'">'+bLbl+'</span>'
      + '<span class="tx-amt '+(neg?'neg':'pos')+'">'+(neg?'- ':'+ ')+fmt(t.amount)+'</span></div>'
      + '</div>';
  }).join('');
  var btn = document.querySelector('#cb_'+card+' .show-more');
  if (btn) btn.remove();
}
</script>
